services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer
      POSTGRES_DB: confidential_indexer
    volumes:
      - postgres-dev-data-v18:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer -d confidential_indexer"]
      interval: 2s
      timeout: 2s
      retries: 20

  api:
    image: node:24.18.0-alpine
    working_dir: /app
    command: sh -lc "corepack enable && pnpm install && pnpm build && pnpm --filter @confidential-indexer/api dev"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://indexer:indexer@postgres:5432/confidential_indexer
      HYPERINDEX_DATABASE_URL: postgres://indexer:indexer@postgres:5432/confidential_indexer
      API_HOST: 0.0.0.0
      API_PORT: 3000
    volumes:
      - .:/app
      - pnpm-store:/pnpm
      - node-modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-dev-data-v18:
  pnpm-store:
  node-modules:
