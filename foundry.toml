[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules"]
solc_version = "0.8.35"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
remappings = [
  "@fhevm/solidity/=node_modules/@fhevm/solidity/",
  "@openzeppelin/confidential-contracts/=node_modules/@openzeppelin/confidential-contracts/",
  "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
  "encrypted-types/=node_modules/.pnpm/encrypted-types@0.0.4/node_modules/encrypted-types/",
]
